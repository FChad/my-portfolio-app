<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    
    <!-- Ollama Gradient -->
    <linearGradient id="ollama" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    
    <!-- Debian Gradient -->
    <linearGradient id="debian" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d70a53;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a21142;stop-opacity:1" />
    </linearGradient>
    
    <!-- Apache Gradient -->
    <linearGradient id="apache" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background removed for transparency -->
  
  <!-- Title -->
  <text x="400" y="130" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="32" font-weight="bold">Linux - Ollama Installation</text>
  <text x="400" y="160" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="18">Local AI server setup with web proxy</text>
  
  <!-- Ollama AI -->
  <g transform="translate(200, 250)">
    <circle cx="0" cy="0" r="50" fill="url(#ollama)" opacity="0.9"/>
    <text x="0" y="12" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="40" font-weight="bold">🤖</text>
    <text x="0" y="80" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="20" font-weight="600">Ollama</text>
  </g>
  
  <!-- Debian 12 -->
  <g transform="translate(400, 250)">
    <circle cx="0" cy="0" r="50" fill="url(#debian)" opacity="0.9"/>
    <text x="0" y="12" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="40" font-weight="bold">🐧</text>
    <text x="0" y="80" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="20" font-weight="600">Debian 12</text>
  </g>
  
  <!-- Apache2 -->
  <g transform="translate(600, 250)">
    <circle cx="0" cy="0" r="50" fill="url(#apache)" opacity="0.9"/>
    <text x="0" y="12" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="40" font-weight="bold">🌐</text>
    <text x="0" y="80" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="20" font-weight="600">Apache2</text>
  </g>
</svg> 