<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    
    <!-- Debian Gradient -->
    <linearGradient id="debian" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d70a53;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a21142;stop-opacity:1" />
    </linearGradient>
    
    <!-- Setup/Config Gradient -->
    <linearGradient id="setup" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    
    <!-- Security Gradient -->
    <linearGradient id="security" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>
  
  <!-- Grid Pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#cbd5e1" stroke-width="1" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#grid)"/>
  
  <!-- Title -->
  <text x="400" y="130" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif" font-size="32" font-weight="bold">Debian 12 - Server Initial Setup</text>
  <text x="400" y="160" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="18">Essential server configuration and security hardening guide</text>
  
  <!-- Debian 12 -->
  <g transform="translate(200, 250)">
    <circle cx="0" cy="0" r="50" fill="url(#debian)" opacity="0.9"/>
    <text x="0" y="12" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="40" font-weight="bold">🐧</text>
    <text x="0" y="80" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="20" font-weight="600">Debian 12</text>
  </g>
  
  <!-- System Setup -->
  <g transform="translate(400, 250)">
    <circle cx="0" cy="0" r="50" fill="url(#setup)" opacity="0.9"/>
    <text x="0" y="12" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="40" font-weight="bold">⚙️</text>
    <text x="0" y="80" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="20" font-weight="600">Setup</text>
  </g>
  
  <!-- Security -->
  <g transform="translate(600, 250)">
    <circle cx="0" cy="0" r="50" fill="url(#security)" opacity="0.9"/>
    <text x="0" y="12" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="40" font-weight="bold">🔒</text>
    <text x="0" y="80" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="20" font-weight="600">Security</text>
  </g>
</svg> 